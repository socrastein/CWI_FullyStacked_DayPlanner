<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day Planner</title>
  </head>
  <body class="gap-1">
    <!--  -->
    <!-- Top of the app with title, today's date, and weather container -->
    <!-- 15% of screen height -->
    <!--  -->
    <header
      class="d-flex d-flex px-1 align-items-center justify-content-between py-1 w-100 border-bottom"
    >
      <div id="headerDateContainer" class="px-2"></div>

      <div id="headerWeatherContainer" class="px-2">
        <button
          id="weatherDisplay"
          class="btn btn-sm btn-outline-secondary d-inline-flex align-items-center"
        >
          <p>Weather loading...</p>
        </button>
      </div>
    </header>

    <!--  -->
    <!-- Main container that will hold calendar view and events -->
    <!-- 75% of screen height -->
    <!--  -->
    <div id="calendarContainer">
      <div id="calendarSettingsContainer">
        <select id="slotDurationSelect" name="slotDuration">
          <option value="60">1 hour</option>
          <option value="30">30 minutes</option>
        </select>
      </div>
      <div id="calendarViewArea" data-calendar-view="day">
        <div id="calendarDayContentWrapper" class="calendarDayContent">
          <div
            id="calendarTimeLabelsColumn"
            class="calendarTimeLabelsColumn"
          ></div>
          <div id="calendarDayGridColumn" class="calendarDayGridColumn">
            <div
              id="calendarHourGridLinesContainer"
              class="calendarHourGridLines"
            ></div>
            <div
              id="calendarCurrentTimeLineContainer"
              class="calendarNowLine"
              aria-hidden="true"
            ></div>
            <div id="calendarEventsLayer" class="calendarEventsLayer"></div>
          </div>
        </div>
        <div id="calendarWeekContentWrapper" class="calendarWeekContent"></div>
        <div
          id="calendarMonthContentWrapper"
          class="calendarMonthContent"
        ></div>
      </div>
    </div>

    <!--Event Popup-->
    <div id="clickedEventPopup" class="clickedEventPopup">
      <h2 id="clickedEventPopupTitle"></h2>
      <p id="clickedEventPopupTime"></p>
      <p id="clickedEventPopupAddress"></p>
      <p id="clickedEventPopupDescription"></p>
      <button type="button" id="editEventButton">Edit</button>
    </div>

    <!--Event Popup-->
    <div id="clickedEventPopup" class="clickedEventPopup">
      <h2 id="clickedEventPopupTitle"></h2>
      <p id="clickedEventPopupTime"></p>
      <p id="clickedEventPopupAddress"></p>
      <p id="clickedEventPopupDescription"></p>
      <button type="button" id="editEventButton">Edit</button>
    </div>

    <!-- Container for navigation and new event buttons -->
    <!-- 10% of screen height -->
    <!--  -->
    <footer class="fixed-bottom" style="z-index: 1">
      <div
        class="position-relative d-flex justify-content-center align-items-center px-4 py-3"
      >
        <div
          id="calendarNavButtonsContainer"
          class="d-flex justify-content-center align-items-center gap-4"
        ></div>

        <!-- Calendar Settings Menu -->
        <div class="position-absolute end-0 me-3 me-sm-4">
          <button
            type="button"
            id="calendarSettingsTrigger"
            class="d-flex gap-1 btn btn-sm btn-primary align-items-center justify-content-center"
            data-bs-toggle="dropdown"
            aria-expanded="false"
            title="Calendar Settings"
          >
            <img
              src="./assets/icons/calendar-cog.svg"
              alt=""
              class="calendarSettingsIcon"
              style="width: 1.25rem; height: 1.25rem"
            />
          </button>
          <div class="dropdown-menu pt-0 pb-1">
            <h6 class="dropdown-header -mt-2 text-center">Calendar View</h6>
            <div
              id="calendarDisplayButtonsRoot"
              class="d-flex flex-column gap-1 px-1"
            ></div>
          </div>
        </div>
      </div>
    </footer>
    <div id="eventFormRoot"></div>
  </body>
</html>
