<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day Planner</title>
  </head>
  <body>
    <!--  -->
    <!-- Top of the app with title, today's date, and weather container -->
    <!-- 15% of screen height -->
    <!--  -->
    <header id="appHeader" class="basicContainer">
      <h3 id="appTitle">Day Planner</h3>
      <div id="headerInfoContainer">
        <div id="headerDateContainer"></div>

        <div id="headerWeatherContainer">
          <div id="weatherDisplay">
            <p>Weather loading...</p>
          </div>
        </div>
      </div>
      <!-- Holds the buttons that swap calendar view between Day, Week, Month -->
      <div id="displayButtonsContainer">
        <!-- If we refactor the today button, we can switch out the 'calendarDisplayButtonsRoot' for the 'displayButtonsContainer' -->
        <div id="calendarDisplayButtonsRoot"></div> 
        <button class="displayChangeButton" id="goToTodayButton">Today</button>
      </div>
    </header>

		<!--  -->
		<!-- Main container that will hold calendar view and events -->
		<!-- 75% of screen height -->
		<!--  -->
		<div id="calendarContainer">
			<div id="calendarSettingsContainer">
				<select id="slotDurationSelect" name="slotDuration">
					<option value="60">1 hour</option>
					<option value="30">30 minutes</option>
				</select>
			</div>
			<div id="calendarViewArea" data-calendar-view="day">
				<!-- <div id="react-root"></div> -->
				<!-- <div id="calendarDayContentWrapper" class="calendarDayContent">
				<div
					id="calendarTimeLabelsColumn"
					class="calendarTimeLabelsColumn"
				></div>
				<div id="calendarDayGridColumn" class="calendarDayGridColumn">
					<div
					id="calendarHourGridLinesContainer"
					class="calendarHourGridLines"
					></div>
					<div
					id="calendarCurrentTimeLineContainer"
					class="calendarNowLine"
					aria-hidden="true"
					></div>
					<div id="calendarEventsLayer" class="calendarEventsLayer"></div>
				</div>
				</div>
				<div id="calendarWeekContentWrapper" class="calendarWeekContent"></div>
				<div
				id="calendarMonthContentWrapper"
				class="calendarMonthContent"
				></div> -->
			</div>
		</div>

    <!--  -->
  </div>
  <!--Event Popup-->
  <div id="clickedEventPopup" class="clickedEventPopup">
    <h2 id="clickedEventPopupTitle"></h2>
    <p id="clickedEventPopupTime"></p>
    <p id="clickedEventPopupAddress"></p>
    <p id="clickedEventPopupDescription"></p>
    <button type="button" id="editEventButton">Edit</button>
  </div>
  
    <!-- Container for navigation and new event buttons -->
    <!-- 10% of screen height -->
    <!--  -->
    <div id="calendarActionButtonsContainer">
      <div id="calendarNavButtonsContainer"></div>
      <button id="addEventButton">Add Event</button>
    </div>

		<div id="eventPopupContainer" class="hidden">
		<!-- Event Form -->
		<form id="eventForm">
			<h2 id="eventFormTitle">Add Event</h2>
			<label for="eventTitle">Event Name <span>*</span></label>
			<input type="text" id="eventTitle" name="title" required />
			<label for="eventDate">Date <span>*</span></label>
			<input type="date" id="eventDate" name="date" required />
			<div id="timeContainer">
			<label for="eventStartTime">Start Time <span>*</span></label>
			<input
				type="time"
				id="eventStartTime"
				name="timeStart"
				step="900"
				required
			/>
			<label for="eventEndTime">End Time <span>*</span></label>
			<input
				type="time"
				id="eventEndTime"
				name="timeEnd"
				step="900"
				required
			/>
			<label for="eventColor">Color</label>
			<input
				type="color"
				id="eventColor"
				name="color"
				value="#ffffff"
				list="colorOptions"
			/>
			<datalist id="colorOptions">
				<option value="#ffffff">White</option>
				<option value="#ff0000">Red</option>
				<option value="#00ff00">Green</option>
				<option value="#0000ff">Blue</option>
				<option value="#ffff00">Yellow</option>
				<option value="#ff00ff">Magenta</option>
				<option value="#00ffff">Cyan</option>
			</datalist>
			</div>
			<label for="eventAddress">Address</label>
			<input
			type="text"
			id="eventAddress"
			name="address"
			autocomplete="street-address"
			/>
			<label for="eventDescription">Description</label>
			<textarea
			id="eventDescription"
			name="description"
			rows="4"
			cols="50"
			></textarea>
			<div id="eventFormButtonsContainer">
			<button type="submit">Submit</button>
			<button type="button" id="cancelEventButton">Cancel</button>
			<button type="button" id="deleteEventButton">Delete</button>
			</div>
		</form>
		<!--  -->
		</div>
	</body>
	</html>
