<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day Planner</title>
  </head>
  <body class="gap-1">
    <!--  -->
    <!-- Top of the app with title, today's date, and weather container -->
    <!-- 15% of screen height -->
    <!--  -->
    <header
      class="d-flex d-flex px-1 align-items-center justify-content-between py-1 w-100"
    >
      <div id="headerDateContainer" class="px-2"></div>
      <div id="weatherDisplay"></div>
    </header>

    <!--  -->
    <!-- Main container that will hold calendar view and events -->
    <!-- 75% of screen height -->
    <!--  -->
    <div id="mainContentContainer" class="d-flex flex-column">
      <!-- this is the location for allday display-->
      <div id="calendarAllDayDisplayRoot"></div>

      <div id="calendarContainer" class="d-flex pb-1">
        <div id="calendarViewArea"></div>
      </div>
    </div>

    <!--Event Popup-->
    <div id="clickedEventPopup" class="clickedEventPopup">
      <h2 id="clickedEventPopupTitle" class="fs-2"></h2>
      <p id="clickedEventPopupTime" class="mb-0 fs-5 fw-bold"></p>
      <p id="clickedEventPopupAddress" class="mb-0">
        <span class="fw-semibold">Address:</span>
        <span id="clickedEventPopupAddressText"></span>
      </p>
      <p id="clickedEventPopupDescription">
        <span class="fw-semibold">Description:</span>
        <span id="clickedEventPopupDescriptionText"></span>
      </p>
      <button
        type="button"
        id="editEventButton"
        class="btn btn-sm w-100 btn-primary"
      >
        Edit
      </button>
    </div>

    <!-- Container for navigation and new event buttons -->
    <!-- 10% of screen height -->
    <!--  -->
    <footer class="fixed-bottom bg-body" style="z-index: 2">
      <div
        class="position-relative d-flex justify-content-center align-items-center px-4 py-3"
      >
        <div
          id="calendarNavButtonsContainer"
          class="d-flex justify-content-center align-items-center gap-4"
        ></div>

        <!-- Calendar Settings Button and Dropdown -->
        <button
          type="button"
          id="calendarSettingsTrigger"
          class="d-flex gap-1 btn btn-sm btn-primary align-items-center justify-content-center"
          data-bs-toggle="dropdown"
          data-bs-auto-close="outside"
          aria-expanded="false"
          title="Calendar Settings"
        >
          <img
            src="./assets/icons/calendar-cog.svg"
            alt=""
            class="calendarSettingsIcon"
            style="width: 1.25rem; height: 1.25rem"
          />
        </button>
        <div
          class="dropdown-menu pt-0 pb-1"
          style="--bs-dropdown-min-width: 2rem"
        >
          <h6 class="dropdown-header -mt-2 text-center">Calendar View</h6>
          <div
            id="calendarDisplayButtonsRoot"
            class="d-flex flex-column gap-1 px-1"
          ></div>
        </div>
      </div>
    </footer>
    <div id="eventFormRoot"></div>
  </body>
</html>
