<!doctype html><html lang="en" data-bs-theme="light"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Day Planner</title><link rel="icon" href="favicon.svg"><script defer="defer" src="main.js"></script></head><body><header id="appHeader" class="basicContainer"><h3 id="appTitle">Day Planner</h3><div id="headerInfoContainer"><div id="headerDateContainer"></div><div id="headerWeatherContainer"><div id="weatherDisplay"><p>Weather loading...</p></div></div></div><div id="displayButtonsContainer"><div id="calendarDisplayButtonsRoot"></div></div></header><div id="calendarContainer"><div id="calendarSettingsContainer"><select id="slotDurationSelect" name="slotDuration"><option value="60">1 hour</option><option value="30">30 minutes</option></select></div><div id="calendarViewArea" data-calendar-view="day"><div id="calendarDayContentWrapper" class="calendarDayContent"><div id="calendarTimeLabelsColumn" class="calendarTimeLabelsColumn"></div><div id="calendarDayGridColumn" class="calendarDayGridColumn"><div id="calendarHourGridLinesContainer" class="calendarHourGridLines"></div><div id="calendarCurrentTimeLineContainer" class="calendarNowLine" aria-hidden="true"></div><div id="calendarEventsLayer" class="calendarEventsLayer"></div></div></div><div id="calendarWeekContentWrapper" class="calendarWeekContent"></div><div id="calendarMonthContentWrapper" class="calendarMonthContent"></div></div></div><div id="clickedEventPopup" class="clickedEventPopup"><h2 id="clickedEventPopupTitle"></h2><p id="clickedEventPopupTime"></p><p id="clickedEventPopupAddress"></p><p id="clickedEventPopupDescription"></p><button type="button" id="editEventButton">Edit</button></div><div id="calendarActionButtonsContainer"><div id="calendarNavButtonsContainer"></div></div><div id="eventFormRoot"></div></body></html>
